<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Quản Lý Sinh Viên</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      .btn {
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 3px;
      }
      .btn-add {
        background: #28a745;
        color: white;
      }
      .btn-edit {
        background: #ffc107;
        color: black;
      }
      .btn-delete {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Danh Sách Sinh Viên</h1>

    <form action="/students" method="GET" style="margin-bottom: 20px">
      <input type="text" name="keyword" placeholder="Nhập tên cần tìm..." />
      <button type="submit">Tìm</button>
      <a th:href="@{/students/new}" class="btn btn-add">Thêm Mới</a>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Họ và Tên</th>
          <th>Email</th>
          <th>Tuổi</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="student : ${dsSinhVien}">
          <td th:text="${student.id}">ID</td>
          <td th:text="${student.name}">Tên</td>
          <td th:text="${student.email}">Email</td>
          <td th:text="${student.age}">0</td>
          <td>
            <a
              th:href="@{/students/edit/{id}(id=${student.id})}"
              class="btn btn-edit"
              >Sửa</a
            >
            <a
              th:href="@{/students/delete/{id}(id=${student.id})}"
              class="btn btn-delete"
              onclick="
                return confirm('Bạn có chắc chắn muốn xóa sinh viên này?');
              "
              >Xóa</a
            >
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
